services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis-data:/data

  web:
    # Prebuilt multi-arch image (linux/amd64 + linux/arm64) from Docker Hub.
    # Pin a tag with SR_IMAGE if you don't want :latest.
    image: ${SR_IMAGE:-maximumh/stream-reduce:latest}
    pull_policy: always
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATA_DIR: /data
      RUN_SCHEDULER: "1"
    ports:
      # Host port is configurable; container still serves on 8000.
      # Override by setting WEB_PORT in your environment or .env file.
      - "${WEB_PORT:-8010}:8000"
    volumes:
      - app-data:/data
      # Writable so yt-dlp can refresh the cookie jar on exit.
      - ./cookies:/cookies
    depends_on:
      - redis

  worker:
    image: ${SR_IMAGE:-maximumh/stream-reduce:latest}
    pull_policy: always
    restart: unless-stopped
    command: ["python", "-m", "worker.run"]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATA_DIR: /data
      RUN_SCHEDULER: "0"
    volumes:
      - app-data:/data
      # Writable so yt-dlp can refresh the cookie jar on exit.
      - ./cookies:/cookies
    depends_on:
      - redis

  # Optional: self-hosted RSSHub to widen subscription coverage.
  # Subscribe to e.g. http://rsshub:1200/youtube/channel/<id>
  rsshub:
    image: diygod/rsshub:chromium-bundled
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CACHE_TYPE: memory
    ports:
      - "1200:1200"
    profiles: ["rsshub"]

volumes:
  app-data:
  redis-data:
