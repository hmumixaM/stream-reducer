name: Build and push Docker image

# Builds the multi-arch (amd64 + arm64) image and pushes it to Docker Hub.
#
# One-time setup: add two repository secrets under
# Settings → Secrets and variables → Actions:
#   DOCKERHUB_USERNAME  – Docker Hub account that owns the image (e.g. maximumh)
#   DOCKERHUB_TOKEN     – a Docker Hub access token with read/write scope
#
# Tagging:
#   push to main      -> :latest + :main + :sha-<short>
#   push tag vX.Y.Z   -> :X.Y.Z + :X.Y + :latest
#   manual dispatch   -> :latest (+ branch/sha)

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: maximumh/stream-reduce

# Don't waste minutes: cancel superseded runs on the same ref.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
